<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ﾀﾝｼﾞｮｳﾋﾞｶﾗ ｷｮｳｶﾞ ﾅﾝﾆﾁﾒｶ､ｷﾈﾝﾋﾞｶﾞ ｲﾂｸﾙｶ ｹｲｻﾝｽﾙ ﾍﾟｰｼﾞﾃﾞｽ｡">
    <title>HappyBirthDayFor10kD!!</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>ｲﾁﾏﾝﾆﾁｵﾀｵﾒﾚｰｼｮﾝ.html</h1>
      </header>

      <section class="tool" aria-label="ﾀﾝｼﾞｮｳﾋﾞ ｶｳﾝﾀｰ">
        <form class="controls" id="birthday-form">
          <label class="field birth-field">
            <span>ｷｻﾏﾉﾀﾝｼﾞｮｳﾋﾞ</span>
            <input
              id="birthdate"
              name="birthdate"
              type="text"
              inputmode="numeric"
              autocomplete="bday"
              pattern="[0-9０-９]{8}"
              maxlength="8"
              placeholder="YYYYMMDD"
              required
            >
          </label>

          <label class="field day-field" id="custom-days-field" hidden>
            <span>ｾｲﾀﾝXﾆﾁﾒｦｼﾗﾍﾞﾙ</span>
            <input
              id="custom-days"
              name="custom-days"
              type="text"
              inputmode="numeric"
              pattern="[0-9０-９]*"
              placeholder="8888"
            >
          </label>

          <button class="primary-button" type="submit">ｹｲｻﾝｼﾃ</button>
        </form>

        <div class="status" id="status" role="status" aria-live="polite"></div>

        <section class="summary" id="summary" hidden>
          <div class="today-panel">
            <p class="today-message">
              <span id="today-prefix">ｷｮｳﾊ</span>
              <output id="today-days"></output>
              <span id="today-suffix">ﾆﾁﾒﾃﾞｽ</span>
            </p>
            <p class="today-date" id="today-date" hidden></p>
          </div>

          <div class="result-grid">
            <article class="milestone">
              <span class="milestone-count">7777ﾆﾁﾒ</span>
              <output id="date-7777"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">10000ﾆﾁﾒ</span>
              <output id="date-10000"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">20000ﾆﾁﾒ</span>
              <output id="date-20000"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">30000ﾆﾁﾒ</span>
              <output id="date-30000"></output>
            </article>
          </div>

          <article class="custom-result" id="custom-result" hidden>
            <span class="milestone-count"><span id="custom-label"></span>ﾒ</span>
            <output id="custom-date"></output>
          </article>
        </section>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
