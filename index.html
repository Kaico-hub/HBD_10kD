<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="生年月日から生誕日数を計算するページです。">
    <title>生誕日数</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>生誕日数</h1>
      </header>

      <section class="tool" aria-label="生誕日数計算">
        <form class="controls" id="birthday-form">
          <label class="field">
            <span>生年月日</span>
            <input id="birthdate" name="birthdate" type="date" required>
          </label>

          <button class="primary-button" type="submit">計算</button>
        </form>

        <div class="status" id="status" role="status" aria-live="polite"></div>

        <section class="summary" id="summary" hidden>
          <div class="today-panel">
            <p class="today-message">今日は生誕<output id="today-days"></output>日目です！</p>
          </div>

          <div class="milestones" aria-label="記念日">
            <article class="milestone">
              <span class="milestone-count">7777日になる日付</span>
              <output id="date-7777"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">10000日になる日付</span>
              <output id="date-10000"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">20000日になる日付</span>
              <output id="date-20000"></output>
            </article>
            <article class="milestone">
              <span class="milestone-count">30000日になる日付</span>
              <output id="date-30000"></output>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
